<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f2f4f8;
}

header {
  background: #111827;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
}

#reader {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

.card {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  display: none;
}

.status {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.valid {
  background: #d1fae5;
  color: #065f46;
}

.field {
  margin-bottom: 12px;
}

.label {
  font-size: 13px;
  color: #6b7280;
}

.value {
  font-size: 18px;
  font-weight: 600;
}

.big {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}
</style>
</head>
<body>

<header>Ticket Scanner</header>

<div id="reader"></div>

<div class="card" id="resultCard">
  <div class="status valid">✓ VALID TICKET</div>

  <div class="big" id="showField"></div>

  <div class="field">
    <div class="label">Name</div>
    <div class="value" id="nameField"></div>
  </div>

  <div class="field">
    <div class="label">Email</div>
    <div class="value" id="emailField"></div>
  </div>

  <div class="field">
    <div class="label">Adults</div>
    <div class="value" id="adultsField"></div>
  </div>

  <div class="field">
    <div class="label">Children</div>
    <div class="value" id="childrenField"></div>
  </div>

  <div class="field">
    <div class="label">Seats</div>
    <div class="value" id="seatsField"></div>
  </div>

  <div class="field">
    <div class="label">Order ID</div>
    <div class="value" id="orderField"></div>
  </div>
</div>

<script>
function parseTicket(text) {
  const data = {};

  // Normalize line endings
  const lines = text.replace(/\r/g, "").split("\n");

  lines.forEach(line => {
    const separatorIndex = line.indexOf(":");
    if (separatorIndex !== -1) {
      const key = line.substring(0, separatorIndex).trim();
      const value = line.substring(separatorIndex + 1).trim();
      data[key] = value;
    }
  });

  return data;
}

function displayTicket(data) {
  document.getElementById("nameField").innerText = data["name"] || "-";
  document.getElementById("emailField").innerText = data["email"] || "-";
  document.getElementById("showField").innerText = data["show"] || "-";
  document.getElementById("adultsField").innerText = data["adults"] || "0";
  document.getElementById("childrenField").innerText = data["children"] || "0";
  document.getElementById("seatsField").innerText = data["seats"] || "-";
  document.getElementById("orderField").innerText = data["orderid"] || "-";

  document.getElementById("resultCard").style.display = "block";
}

function onScanSuccess(decodedText) {
  const parsed = parseTicket(decodedText);
  displayTicket(parsed);
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: { exact: "environment" } },  // 🔥 FORCE BACK CAMERA
  {
    fps: 10,
    qrbox: { width: 250, height: 250 }
  },
  onScanSuccess
).catch(err => {
  console.error("Camera error:", err);
});
</script>

</body>
</html>
